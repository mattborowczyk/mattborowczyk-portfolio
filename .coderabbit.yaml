# CodeRabbit configuration
# https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# Auto-review is disabled deliberately: reviews are triggered on demand by
# commenting "@coderabbitai review" on a PR. This conserves the review budget
# so no review is spent unless explicitly requested.
language: en-GB
reviews:
  profile: chill
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: false
    drafts: false
chat:
  auto_reply: true
