# CodeRabbit configuration
# https://docs.coderabbit.ai/getting-started/configure-coderabbit
#
# Repo is public → CodeRabbit's open-source plan gives full line-by-line
# reviews. Auto-review is enabled so every phase PR is reviewed on open;
# `assertive` profile favours thoroughness over brevity.
language: en-GB
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: false
  auto_review:
    enabled: true
    drafts: false
chat:
  auto_reply: true
